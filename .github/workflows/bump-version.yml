name: Bump data version

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'data/version.json'

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump patch version
        run: |
          FILE=data/version.json
          CUR=$(node -p "require('./$FILE').version")
          IFS='.' read -r MA MI PA <<< "$CUR"
          NEW="$MA.$MI.$((PA+1))"
          echo "{ \"version\": \"$NEW\" }" > $FILE
          echo "Version: $CUR -> $NEW"

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/version.json
          git commit -m "chore: bump data version [skip ci]" || echo "no changes"
          git push
