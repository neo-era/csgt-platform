<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>CSGT Platform — Chọn module</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="core/core-config.js"></script>
  <style>
    :root { --navy:#0f172a; --primary:#2563eb; --sky:#0ea5e9; --radius:14px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif; background: var(--navy);
      color: #e2e8f0; min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px env(safe-area-inset-right) 24px env(safe-area-inset-left);
      background-image: radial-gradient(circle at 20% 20%, #1e293b 0%, var(--navy) 60%);
    }
    header { text-align: center; margin-bottom: 32px; }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -.02em; }
    header p { color: #94a3b8; margin-top: 6px; font-size: .9rem; }
    .grid { display: grid; gap: 18px; width: 100%; max-width: 760px; grid-template-columns: 1fr; }
    @media (min-width: 640px) { .grid { grid-template-columns: 1fr 1fr; } }
    .card {
      display: block; text-decoration: none; color: inherit; background: #1e293b;
      border: 1px solid #334155; border-radius: var(--radius); padding: 24px;
      transition: transform .15s, border-color .15s, box-shadow .15s;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(0,0,0,.35); }
    .card.khaosat:hover { border-color: var(--primary); }
    .card.dentat:hover  { border-color: var(--sky); }
    .badge { width: 46px; height: 46px; border-radius: 12px; display: grid; place-items: center;
      font-size: 1.4rem; margin-bottom: 14px; }
    .khaosat .badge { background: rgba(37,99,235,.18); }
    .dentat  .badge { background: rgba(14,165,233,.18); }
    .card h2 { font-size: 1.15rem; font-weight: 600; }
    .card p { color: #94a3b8; font-size: .85rem; margin-top: 6px; line-height: 1.5; }
    footer { margin-top: 28px; color: #64748b; font-size: .75rem; text-align: center; }
  </style>
</head>
<body>
  <header>
    <h1>Hệ thống Quản lý Chiếu sáng Công cộng</h1>
    <p>CSCC TP.HCM — chọn module để bắt đầu</p>
  </header>

  <main class="grid">
    <a class="card khaosat" href="khaosat/index.html">
      <div class="badge">🗺️</div>
      <h2>Khảo sát chiếu sáng</h2>
      <p>Kiểm kê trụ – tủ – đèn trên bản đồ, GPS/RTK, xuất CAD VN2000 và bản vẽ kỹ thuật.</p>
    </a>
    <a class="card dentat" href="dentat/index.html">
      <div class="badge">💡</div>
      <h2>Quản lý đèn tắt</h2>
      <p>Theo dõi đèn hư/tắt, báo cáo sự cố, biên bản phối hợp với TTQLHTKT.</p>
    </a>
  </main>

  <footer>
    <span id="ver">CSGT Platform</span> · neo-era
  </footer>

  <script>
    // Đăng ký Service Worker chung
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    }
    // Hiện version dữ liệu
    fetch('data/version.json').then(function (r) { return r.json(); })
      .then(function (v) { document.getElementById('ver').textContent = 'CSGT Platform v' + v.version; })
      .catch(function () {});
  </script>
</body>
</html>
