<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="sh5" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity=".35"/>
    </filter>
    <linearGradient id="gl5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- legs (nổi — trên mặt đất) -->
  <rect x="14" y="54" width="7" height="10" rx="2" fill="#1d4ed8" opacity="0.65"/>
  <rect x="43" y="54" width="7" height="10" rx="2" fill="#1d4ed8" opacity="0.65"/>
  <!-- cabinet body -->
  <rect x="8" y="6" width="48" height="50" rx="5" fill="url(#gl5)" stroke="white" stroke-width="1.5" filter="url(#sh5)"/>
  <!-- top section divider -->
  <line x1="8" y1="23" x2="56" y2="23" stroke="white" stroke-width="1.5" opacity="0.55"/>
  <!-- top control panel -->
  <rect x="14" y="10" width="36" height="10" rx="3" fill="white" opacity="0.18"/>
  <!-- indicator lights -->
  <circle cx="24" cy="15" r="2.5" fill="#86efac" opacity="0.95"/>
  <circle cx="32" cy="15" r="2.5" fill="white" opacity="0.85"/>
  <circle cx="40" cy="15" r="2.5" fill="#fca5a5" opacity="0.9"/>
  <!-- door handle bar -->
  <rect x="27" y="33" width="10" height="3.5" rx="1.75" fill="white" opacity="0.85"/>
  <!-- door handle circle / knob -->
  <circle cx="32" cy="43" r="4.5" fill="white" opacity="0.2" stroke="white" stroke-width="1.5"/>
  <!-- bottom vents -->
  <line x1="16" y1="50" x2="48" y2="50" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- label -->
  <text x="9" y="63" font-family="Arial,sans-serif" font-size="7" font-weight="700" fill="#2563eb" opacity="0.9">CS NỔI</text>
</svg>
