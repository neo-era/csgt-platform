<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="sh3" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.8" flood-opacity=".35"/>
    </filter>
    <linearGradient id="gl3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- base plate -->
  <rect x="18" y="59" width="20" height="4" rx="2" fill="#10b981" opacity="0.5"/>
  <!-- pole -->
  <rect x="24" y="22" width="8" height="38" rx="4" fill="url(#gl3)" filter="url(#sh3)"/>
  <!-- arm (HTLT — cao hơn, cần dài hơn) -->
  <path d="M28 22 C28 11 36 5 50 3" stroke="#10b981" stroke-width="5" stroke-linecap="round" fill="none" filter="url(#sh3)"/>
  <!-- lamp body (lớn hơn) -->
  <rect x="38" y="0" width="24" height="10" rx="5" fill="url(#gl3)" filter="url(#sh3)"/>
  <!-- lamp glass -->
  <rect x="41" y="2" width="18" height="6" rx="3" fill="white" opacity="0.88"/>
  <!-- glow -->
  <ellipse cx="50" cy="5" rx="8" ry="3" fill="white" opacity="0.45"/>
  <!-- label -->
  <text x="2" y="12" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#10b981" opacity="0.85">HTLT</text>
</svg>
