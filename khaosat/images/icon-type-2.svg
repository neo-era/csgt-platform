<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="sh2" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.8" flood-opacity=".35"/>
    </filter>
    <linearGradient id="gl2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
  </defs>
  <!-- base plate -->
  <rect x="18" y="59" width="20" height="4" rx="2" fill="#ec4899" opacity="0.5"/>
  <!-- pole (trang trí — thon hơn + có khoanh) -->
  <rect x="25" y="22" width="7" height="38" rx="3.5" fill="url(#gl2)" filter="url(#sh2)"/>
  <!-- khoanh trang trí trên cột -->
  <rect x="24" y="30" width="9" height="3" rx="1.5" fill="#fbcfe8" opacity="0.7"/>
  <rect x="24" y="42" width="9" height="3" rx="1.5" fill="#fbcfe8" opacity="0.7"/>
  <!-- arm (2 cần đối xứng) -->
  <path d="M28.5 22 C28 13 34 7 46 5" stroke="#ec4899" stroke-width="4.5" stroke-linecap="round" fill="none" filter="url(#sh2)"/>
  <!-- lamp body -->
  <rect x="36" y="0" width="26" height="12" rx="6" fill="url(#gl2)" filter="url(#sh2)"/>
  <!-- lamp glass -->
  <rect x="39" y="2.5" width="20" height="7" rx="3.5" fill="white" opacity="0.88"/>
  <!-- glow -->
  <ellipse cx="49" cy="6" rx="8" ry="3" fill="white" opacity="0.45"/>
  <!-- label -->
  <text x="2" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="700" fill="#ec4899" opacity="0.85">T.TRÍ</text>
</svg>
