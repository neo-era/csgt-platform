<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="sh1" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.8" flood-opacity=".35"/>
    </filter>
    <linearGradient id="gl1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
  </defs>
  <!-- base plate -->
  <rect x="18" y="59" width="20" height="4" rx="2" fill="#0ea5e9" opacity="0.5"/>
  <!-- pole -->
  <rect x="24" y="22" width="8" height="38" rx="4" fill="url(#gl1)" filter="url(#sh1)"/>
  <!-- arm -->
  <path d="M28 22 C28 13 34 7 46 5" stroke="#0ea5e9" stroke-width="5" stroke-linecap="round" fill="none" filter="url(#sh1)"/>
  <!-- lamp body -->
  <rect x="36" y="0" width="26" height="12" rx="6" fill="url(#gl1)" filter="url(#sh1)"/>
  <!-- lamp glass -->
  <rect x="39" y="2.5" width="20" height="7" rx="3.5" fill="white" opacity="0.88"/>
  <!-- glow -->
  <ellipse cx="49" cy="6" rx="8" ry="3" fill="white" opacity="0.45"/>
  <!-- label STK -->
  <text x="4" y="12" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#0ea5e9" opacity="0.85">STK</text>
</svg>
